<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Arduino LED Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #1a1a2e;
        color: #e0e0e0;
      }
      #root {
        text-align: center;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 1.5rem;
        color: #a0a8d0;
        letter-spacing: 0.05em;
      }
      .buttons {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        margin-bottom: 1.5rem;
      }
      button {
        padding: 0.9rem 2.2rem;
        font-size: 1.1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: opacity 0.15s, transform 0.1s;
      }
      button:active  { transform: scale(0.96); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      .btn-start { background: #4caf50; color: #fff; }
      .btn-stop  { background: #e53935; color: #fff; }
      .status {
        min-height: 1.5rem;
        font-size: 0.95rem;
        border-radius: 6px;
        padding: 0.5rem 1rem;
      }
      .status.ok    { color: #81c784; }
      .status.error { color: #e57373; }
      .status.busy  { color: #90caf9; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const API_BASE = "http://localhost:8080";

      function App() {
        const [status, setStatus]   = React.useState({ text: "Ready", type: "ok" });
        const [loading, setLoading] = React.useState(false);

        async function sendCommand(endpoint, label) {
          setLoading(true);
          setStatus({ text: `Sending ${label}…`, type: "busy" });
          try {
            const res = await fetch(`${API_BASE}${endpoint}`, { method: "POST" });
            const data = await res.json();
            if (!res.ok) {
              throw new Error(data.detail || `HTTP ${res.status}`);
            }
            setStatus({
              text: `${label} — Arduino: ${data.arduino_response}`,
              type: "ok",
            });
          } catch (err) {
            setStatus({ text: `Error: ${err.message}`, type: "error" });
          } finally {
            setLoading(false);
          }
        }

        return (
          <div>
            <h1>Arduino LED Integration Test</h1>
            <div className="buttons">
              <button
                className="btn-start"
                disabled={loading}
                onClick={() => sendCommand("/sauce/start", "Start Saucing")}
              >
                Start Saucing
              </button>
              <button
                className="btn-stop"
                disabled={loading}
                onClick={() => sendCommand("/sauce/stop", "Stop Saucing")}
              >
                Stop Saucing
              </button>
            </div>
            <div className={`status ${status.type}`}>{status.text}</div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
