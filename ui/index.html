<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Prevent zooming on touch devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Sauce Dispenser</title>
    <link rel="stylesheet" href="style.css?v=2" />
  </head>
  <body>

    <div class="container">

      <!-- Title -->
      <header>
        <h1>Sauce Dispenser</h1>
        <p class="subtitle">Touch to select your sauce amount</p>
      </header>

      <!-- Quantity selector -->
      <section class="quantity-section" aria-label="Sauce quantity selector">
        <p class="section-label">How much sauce?</p>

        <div class="quantity-buttons">

          <!-- Light: single drop -->
          <button class="qty-btn" id="btn-light" data-value="Light" aria-pressed="false">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2 C12 2 5 10 5 15 A7 7 0 0 0 19 15 C19 10 12 2 12 2 Z"
                    fill="currentColor"/>
            </svg>
            <span class="btn-label">Light</span>
            <span class="btn-sub">A little</span>
          </button>

          <!-- Medium: two drops -->
          <button class="qty-btn" id="btn-medium" data-value="Medium" aria-pressed="false">
            <svg class="btn-icon" viewBox="0 0 32 24" aria-hidden="true">
              <path d="M10 2 C10 2 4 9 4 13 A6 6 0 0 0 16 13 C16 9 10 2 10 2 Z"
                    fill="currentColor"/>
              <path d="M22 2 C22 2 16 9 16 13 A6 6 0 0 0 28 13 C28 9 22 2 22 2 Z"
                    fill="currentColor" opacity="0.6"/>
            </svg>
            <span class="btn-label">Medium</span>
            <span class="btn-sub">Just right</span>
          </button>

          <!-- Heavy: three drops -->
          <button class="qty-btn" id="btn-heavy" data-value="Heavy" aria-pressed="false">
            <svg class="btn-icon" viewBox="0 0 40 24" aria-hidden="true">
              <path d="M8 2 C8 2 3 8 3 12 A5 5 0 0 0 13 12 C13 8 8 2 8 2 Z"
                    fill="currentColor" opacity="0.5"/>
              <path d="M20 1 C20 1 14 8 14 13 A6 6 0 0 0 26 13 C26 8 20 1 20 1 Z"
                    fill="currentColor"/>
              <path d="M32 2 C32 2 27 8 27 12 A5 5 0 0 0 37 12 C37 8 32 2 32 2 Z"
                    fill="currentColor" opacity="0.5"/>
            </svg>
            <span class="btn-label">Heavy</span>
            <span class="btn-sub">Load it up</span>
          </button>

        </div>
      </section>

      <!-- Start button -->
      <section class="start-section">
        <button class="start-btn" id="start-btn" disabled aria-disabled="true">
          <span class="start-label" id="start-label">Select amount first</span>
        </button>
      </section>

    </div><!-- /.container -->

    <!-- Full-screen dispensing overlay -->
    <div class="message-overlay" id="message-overlay" role="status" aria-live="assertive" aria-atomic="true">
      <div class="message-card">
        <!-- Spinning ring -->
        <div class="spinner" aria-hidden="true">
          <div class="spinner-ring"></div>
        </div>
        <!-- Message text -->
        <p class="message-text" id="message-text">Dispensing...</p>
        <!-- Progress bar -->
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>

    <!-- Gear / logs button -->
    <button class="gear-btn" id="gear-btn" aria-label="View logs" title="View logs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <!-- Log panel -->
    <div class="log-backdrop" id="log-backdrop"></div>
    <div class="log-panel" id="log-panel" role="dialog" aria-label="System logs" aria-modal="true" hidden>
      <div class="log-panel-header">
        <span class="log-panel-title">System Logs</span>
        <div class="log-panel-actions">
          <button class="log-action-btn" id="log-refresh-btn" title="Refresh">&#8635;</button>
          <button class="log-action-btn" id="log-close-btn" aria-label="Close">&times;</button>
        </div>
      </div>
      <div class="log-debug-bar">
        <button class="log-debug-btn" id="debug-manual-btn">Manual Controls</button>
        <button class="log-debug-btn log-debug-btn--danger" id="debug-restart-btn">Restart Backend</button>
      </div>
      <ol class="log-list" id="log-list" reversed>
        <li class="log-empty">No log entries yet.</li>
      </ol>
    </div>

    <!-- Manual controls popup -->
    <div class="manual-modal" id="manual-modal" hidden>
      <div class="manual-modal-card">
        <div class="manual-modal-header">
          <span>Manual Controls</span>
          <button class="log-action-btn" id="manual-modal-close" aria-label="Close">&times;</button>
        </div>
        <div class="manual-modal-grid">
          <button class="log-debug-btn" id="debug-home-grabber-btn">Home Grabber</button>
          <button class="log-debug-btn" id="debug-home-extruder-btn">Home Extruder</button>
          <button class="log-debug-btn" id="debug-close-grabber-btn">Close Grabber</button>
          <button class="log-debug-btn" id="debug-open-grabber-btn">Open Grabber</button>
          <button class="log-debug-btn" id="debug-open-extruder-btn">Open Extruder</button>
          <button class="log-debug-btn" id="debug-meet-plunger-btn">Meet Plunger</button>
          <button class="log-debug-btn" id="debug-home-gantry-btn">Zero Gantry</button>
          <button class="log-debug-btn manual-modal-grid--full" id="debug-move-gantry-btn">Move Gantry</button>
        </div>
      </div>
    </div>

    <!-- Gantry location picker popup -->
    <div class="manual-modal" id="gantry-modal" hidden>
      <div class="manual-modal-card">
        <div class="manual-modal-header">
          <span>Move Gantry To</span>
          <button class="log-action-btn" id="gantry-modal-close" aria-label="Close">&times;</button>
        </div>
        <p class="gantry-current-pos" id="gantry-current-pos">Current position: --</p>
        <div class="manual-modal-grid" id="gantry-location-grid">
          <!-- populated by JS from /api/manual/gantry-positions -->
        </div>
        <div class="gantry-custom-row">
          <div class="gantry-slider-wrap">
            <span class="gantry-slider-val" id="gantry-slider-val">0 mm</span>
            <input type="range" id="gantry-custom-input" class="gantry-custom-input" min="0" max="400" step="1" value="0" />
            <div class="gantry-slider-ticks"><span>0</span><span>100</span><span>200</span><span>300</span><span>400</span></div>
          </div>
          <button class="log-debug-btn" id="gantry-custom-btn">Move</button>
        </div>
      </div>
    </div>

    <script src="script.js?v=3"></script>
  </body>
</html>
